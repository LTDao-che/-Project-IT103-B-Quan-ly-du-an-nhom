<!DOCTYPE html>
<html lang="vi">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Trang đăng ký</title>
  <link rel="stylesheet" href="../css/reset.css">
  <link rel="stylesheet" href="../css/base.css">
  <link rel="stylesheet" href="../css/register.css">
</head>

<body>
  <div class="container">
    <header class="header">
      <h1>Trang đăng ký</h1>
    </header>
    <main class="main">
      <div class="title"><h1>Đăng ký</h1></div>
      
      <section class="form-section">
        <form id="user-form" class="user-form">
          <div class="form-group">
            <input type="text" id="user-name" name="name" placeholder="Họ và tên"  oninput="clearAllErrors()"/>
            <div class="error"></div>
          </div>

          <div class="form-group">
            <input type="text" id="user-email" name="email" placeholder="Địa chỉ email"  oninput="clearAllErrors()"/>
            <div class="error"></div>
          </div>

          <div class="form-group">
            <input type="password" id="user-password" name="password" placeholder="Mật khẩu" oninput="clearAllErrors()"/>
            <div class="error"></div>
          </div>

          <div class="form-group">
            <input type="password" id="confirm-password" name="confirm" placeholder="Xác nhận Mật khẩu"  oninput="clearAllErrors()"/>
            <div class="error"></div>
          </div>

          <button type="submit" class="btn-add" >Đăng ký</button>
        </form>
        <p class="form-footer">Đã có tài khoản? <span class="login"><a href="login.html"> Đăng nhập</a></span></p>
      </section>

    </main>
  </div>
  <script src="../js/register.js"></script>
</body>

</html>
